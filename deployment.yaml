apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-application-aws-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-application-aws
  template:
    metadata:
      labels:
        app: devops-application-aws
    spec:
      containers:
        - name: devops-application-aws
          image: erdincekiztas/devops-application-aws:1.0.27
          resources:
            limits:
              memory: "300Mi"
              cpu: "500m"
          ports:
            - containerPort: 8080   # Pod içindeki .jar uygulamanın portu
